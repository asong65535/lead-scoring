version: "3.8"

services:
  # ============================================
  # FastAPI Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead-scoring-app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=lead_scoring
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lead-scoring-network
    # Override command for development (hot reload)
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: lead-scoring-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lead_scoring
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lead_scoring"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lead-scoring-network

  # ============================================
  # Redis (optional, for caching - uncomment when needed)
  # ============================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: lead-scoring-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped
  #   networks:
  #     - lead-scoring-network

volumes:
  postgres_data:
  # redis_data:

networks:
  lead-scoring-network:
    driver: bridge
